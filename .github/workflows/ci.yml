name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # Job 1: Unit Tests (Fast, no network required)
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Auto-fix lockfile
        if: failure()
        run: |
          pnpm install --no-frozen-lockfile
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: update pnpm-lock.yaml [skip ci]" || echo "No changes to commit"
          git push
      - run: pnpm test # This should only run *.spec.ts [cite: 2026-01-30]

  # Job 2: Integration Tests (Slow, requires Appwrite)
  integration_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run integration if build succeeds to save resources [cite: 2026-01-26]
    needs: unit_tests
    env:
      EXPO_PUBLIC_APPWRITE_ENDPOINT: ${{ vars.EXPO_PUBLIC_APPWRITE_ENDPOINT }}
      EXPO_PUBLIC_APPWRITE_PROJECT_ID: ${{ vars.EXPO_PUBLIC_APPWRITE_PROJECT_ID }}
      EXPO_PUBLIC_APPWRITE_DATABASE_ID: ${{ vars.EXPO_PUBLIC_APPWRITE_DATABASE_ID }}
      EXPO_PUBLIC_DB_PREFIX: test
      APPWRITE_API_SECRET: ${{ secrets.APPWRITE_API_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Auto-fix lockfile
        if: failure()
        run: |
          pnpm install --no-frozen-lockfile
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: update pnpm-lock.yaml [skip ci]" || echo "No changes to commit"
          git push
      # Critical step: Provision the isolated test environment [cite: 2026-01-30]
      - name: Provision Test DB
        run: pnpm run db:provision:test
      - name: Run Integration Tests
        run: pnpm run test:integration
